<!DOCTYPE html>
<html lang="zh-TW" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>資訊網路題庫練習系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Segoe UI', 'Tahoma', 'Geneva', 'Verdana', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        /* 避免點擊時的藍色高光 */
        * {
            -webkit-tap-highlight-color: transparent;
        }
        /* 自訂捲軸樣式 */
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background-color: #4b5563;
            border-radius: 20px;
        }
        .dark .custom-scrollbar::-webkit-scrollbar-thumb {
            background-color: #374151;
        }
    </style>
</head>
<body class="min-h-screen bg-gray-100 dark:bg-[#121212]">
    <!-- 頂部導覽列 -->
    <header class="bg-white dark:bg-[#1e1e1e] border-b border-gray-200 dark:border-gray-800 px-4 py-3 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <div class="flex items-center justify-center w-8 h-8 rounded-md bg-blue-100 dark:bg-gray-700 text-blue-600 dark:text-white font-bold">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0 3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
                </svg>
            </div>
            <h1 class="text-lg md:text-xl font-bold">資訊網路題庫練習系統</h1>
        </div>
        <div class="flex items-center flex-wrap gap-2">
            <button onclick="toggleTheme()" id="theme-btn" class="flex items-center gap-1.5 px-3 py-1.5 bg-amber-500 hover:bg-amber-600 text-white text-xs md:text-sm font-medium rounded transition-colors">
                <span>淺色模式</span>
            </button>
            <button onclick="toggleMode()" id="mode-btn" class="flex items-center gap-1.5 px-3 py-1.5 bg-emerald-500 hover:bg-emerald-600 text-white text-xs md:text-sm font-medium rounded transition-colors">
                <span>讀題模式</span>
            </button>
        </div>
    </header>

    <!-- 主要內容區 -->
    <main class="max-w-7xl mx-auto px-4 py-8">
        <div class="flex justify-between items-end border-b border-gray-200 dark:border-gray-800 pb-4 mb-6">
            <span id="progress" class="text-sm md:text-base font-medium text-gray-500 dark:text-gray-400"></span>
            <span id="score" class="text-sm md:text-base font-bold text-gray-600 dark:text-gray-300"></span>
        </div>

        <!-- 題目內容 -->
        <div id="question" class="text-lg md:text-xl font-bold mb-8 text-gray-800 dark:text-gray-100 leading-relaxed"></div>

        <!-- 選項列表 -->
        <ul id="options" class="space-y-3 mb-6"></ul>

        <!-- 回饋訊息 -->
        <div id="feedback" class="text-center font-bold text-lg min-h-[30px] mb-8"></div>

        <!-- 底部控制按鈕 -->
        <div class="flex justify-between gap-4 mt-8 border-t border-gray-200 dark:border-gray-800 pt-6">
            <button id="prev-btn" onclick="prevQuestion()" class="flex-1 max-w-[160px] md:max-w-[200px] flex items-center justify-center gap-2 bg-gray-200 dark:bg-[#2d2d2d] hover:bg-gray-300 dark:hover:bg-[#3d3d3d] text-gray-700 dark:text-gray-200 py-2.5 md:py-3 rounded-xl font-bold transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
                ← 上一題
            </button>
            <button id="next-btn" onclick="nextQuestion()" class="flex-1 max-w-[160px] md:max-w-[200px] flex items-center justify-center gap-2 bg-blue-600 hover:bg-blue-700 text-white py-2.5 md:py-3 rounded-xl font-bold transition-colors">
                下一題 →
            </button>
        </div>
    </main>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>測驗題庫系統 - 首頁</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    <style>
        /* 避免點擊時的藍色高光 */
        * {
            -webkit-tap-highlight-color: transparent;
        }
    </style>
</head>
<body class="min-h-screen bg-gray-100 dark:bg-[#121212] text-gray-900 dark:text-gray-100 font-sans selection:bg-blue-500/30 transition-colors duration-300">

    <!-- 頂部導覽列 -->
    <header class="bg-white dark:bg-[#1e1e1e] border-b border-gray-200 dark:border-gray-800 px-6 py-3 flex items-center justify-between sticky top-0 z-10 shadow-md transition-colors duration-300">
        <div class="flex items-center gap-4">
            <div class="flex items-center justify-center w-8 h-8 rounded-md bg-blue-100 dark:bg-gray-700 text-blue-600 dark:text-white font-bold">
                <!-- BookOpen Icon -->
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
                </svg>
            </div>
            <h1 class="text-xl font-bold tracking-wide text-gray-800 dark:text-white">測驗題庫系統</h1>
        </div>
        
        <!-- 頂部按鈕群 -->
        <div class="flex items-center gap-3">
            <button onclick="toggleTheme()" id="theme-btn" class="flex items-center gap-1.5 px-3 py-1.5 bg-amber-500 hover:bg-amber-600 text-white text-sm font-medium rounded transition-colors shadow-sm">
                <!-- Sun Icon -->
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/>
                </svg>
                <span>淺色模式</span>
            </button>
        </div>
    </header>

    <!-- 主要內容區 -->
    <main class="max-w-6xl mx-auto px-6 py-12">
        <div class="text-center mb-12">
            <h2 class="text-3xl font-bold mb-4 text-gray-900 dark:text-white transition-colors duration-300">請選擇測驗科目</h2>
            <p class="text-gray-500 dark:text-gray-400 transition-colors duration-300">點選下方卡片以進入專屬題庫並開始您的練習</p>
        </div>

        <!-- 題庫選擇卡片網格 (調整為 1~3 欄自適應) -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 max-w-5xl mx-auto">
            
            <!-- 卡片 1：企業管理 -->
            <div
                onclick="handleSelect(this, 'ba-test.html')"
                class="group relative overflow-hidden cursor-pointer bg-white dark:bg-[#1a1a1a] border border-gray-200 dark:border-gray-800 rounded-2xl p-8 transition-all duration-300 ease-in-out transform hover:-translate-y-1 hover:border-blue-500/50 hover:shadow-[0_0_15px_rgba(59,130,246,0.15)] flex flex-col shadow-sm dark:shadow-none"
            >
                <div class="absolute top-0 left-0 right-0 h-32 bg-gradient-to-b from-blue-500/5 dark:from-blue-500/10 to-transparent opacity-50"></div>
                
                <div class="relative z-10 flex-1 flex flex-col">
                    <!-- Briefcase Icon -->
                    <svg class="w-12 h-12 text-blue-500 dark:text-blue-400 mb-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect width="20" height="14" x="2" y="7" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/>
                    </svg>
                    
                    <h3 class="text-2xl font-bold text-gray-800 dark:text-white mb-1">企業管理</h3>
                    <p class="text-sm text-gray-500 font-mono mb-8 flex-1">Business Management</p>

                    <div class="flex items-center justify-between mt-auto pt-4 border-t border-gray-100 dark:border-gray-800/50">
                        <span class="text-sm font-medium text-gray-600 dark:text-gray-300">開始測驗</span>
                        <div class="w-8 h-8 rounded-full bg-gray-100 dark:bg-gray-800 flex items-center justify-center text-gray-600 dark:text-white transition-all group-hover:translate-x-1 group-hover:bg-blue-100 dark:group-hover:bg-gray-700 group-hover:text-blue-600">
                            <!-- ChevronRight Icon -->
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="m9 18 6-6-6-6"/>
                            </svg>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 卡片 2：資訊網路 (Chapter 1) -->
            <div
                onclick="handleSelect(this, 'it-test.html')"
                class="group relative overflow-hidden cursor-pointer bg-white dark:bg-[#1a1a1a] border border-gray-200 dark:border-gray-800 rounded-2xl p-8 transition-all duration-300 ease-in-out transform hover:-translate-y-1 hover:border-purple-500/50 hover:shadow-[0_0_15px_rgba(168,85,247,0.15)] flex flex-col shadow-sm dark:shadow-none"
            >
                <div class="absolute top-0 left-0 right-0 h-32 bg-gradient-to-b from-purple-500/5 dark:from-purple-500/10 to-transparent opacity-50"></div>
                
                <div class="relative z-10 flex-1 flex flex-col">
                    <!-- Network Icon -->
                    <svg class="w-12 h-12 text-purple-500 dark:text-purple-400 mb-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="16" y="16" width="6" height="6" rx="1"/><rect x="2" y="16" width="6" height="6" rx="1"/><rect x="9" y="2" width="6" height="6" rx="1"/><path d="M5 16v-3a1 1 0 0 1 1-1h12a1 1 0 0 1 1 1v3"/><path d="M12 12V8"/>
                    </svg>
                    
                    <h3 class="text-2xl font-bold text-gray-800 dark:text-white mb-1">資訊網路 <span class="text-lg text-purple-500 dark:text-purple-400">Ch.1</span></h3>
                    <p class="text-sm text-gray-500 font-mono mb-8 flex-1">Info Networks - Chapter 1</p>

                    <div class="flex items-center justify-between mt-auto pt-4 border-t border-gray-100 dark:border-gray-800/50">
                        <span class="text-sm font-medium text-gray-600 dark:text-gray-300">開始測驗</span>
                        <div class="w-8 h-8 rounded-full bg-gray-100 dark:bg-gray-800 flex items-center justify-center text-gray-600 dark:text-white transition-all group-hover:translate-x-1 group-hover:bg-purple-100 dark:group-hover:bg-gray-700 group-hover:text-purple-600">
                            <!-- ChevronRight Icon -->
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="m9 18 6-6-6-6"/>
                            </svg>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 卡片 3：資訊網路 (Chapter 5) -->
            <div
                onclick="handleSelect(this, 'it-test2.html')"
                class="group relative overflow-hidden cursor-pointer bg-white dark:bg-[#1a1a1a] border border-gray-200 dark:border-gray-800 rounded-2xl p-8 transition-all duration-300 ease-in-out transform hover:-translate-y-1 hover:border-indigo-500/50 hover:shadow-[0_0_15px_rgba(99,102,241,0.15)] flex flex-col shadow-sm dark:shadow-none"
            >
                <div class="absolute top-0 left-0 right-0 h-32 bg-gradient-to-b from-indigo-500/5 dark:from-indigo-500/10 to-transparent opacity-50"></div>
                
                <div class="relative z-10 flex-1 flex flex-col">
                    <!-- Wifi/Network Icon -->
                    <svg class="w-12 h-12 text-indigo-500 dark:text-indigo-400 mb-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M5 12.55a11 11 0 0 1 14.08 0"/><path d="M1.42 9a16 16 0 0 1 21.16 0"/><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/><line x1="12" y1="20" x2="12.01" y2="20"/>
                    </svg>
                    
                    <h3 class="text-2xl font-bold text-gray-800 dark:text-white mb-1">資訊網路 <span class="text-lg text-indigo-500 dark:text-indigo-400">Ch.5</span></h3>
                    <p class="text-sm text-gray-500 font-mono mb-8 flex-1">Info Networks - Chapter 5</p>

                    <div class="flex items-center justify-between mt-auto pt-4 border-t border-gray-100 dark:border-gray-800/50">
                        <span class="text-sm font-medium text-gray-600 dark:text-gray-300">開始測驗</span>
                        <div class="w-8 h-8 rounded-full bg-gray-100 dark:bg-gray-800 flex items-center justify-center text-gray-600 dark:text-white transition-all group-hover:translate-x-1 group-hover:bg-indigo-100 dark:group-hover:bg-gray-700 group-hover:text-indigo-600">
                            <!-- ChevronRight Icon -->
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="m9 18 6-6-6-6"/>
                            </svg>
                        </div>
                    </div>
                </div>
            </div>

        </div>

        <!-- 底部提示區塊 -->
        <div class="mt-16 text-center">
            <div class="inline-flex items-center gap-2 px-4 py-2 rounded-full bg-white dark:bg-[#1e1e1e] border border-gray-200 dark:border-gray-800 text-sm text-gray-500 dark:text-gray-400 shadow-sm dark:shadow-none transition-colors duration-300">
                <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
                系統運行正常・題庫已更新至最新版本
            </div>
        </div>

        <!-- 版權與作者資訊 -->
        <div class="mt-8 text-center text-sm text-gray-400 dark:text-gray-500">
            <a href="https://github.com/hongfu553" target="_blank" rel="noopener noreferrer" class="inline-flex items-center gap-1.5 hover:text-gray-700 dark:hover:text-gray-300 transition-colors duration-200">
                <!-- GitHub Icon -->
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z"/>
                </svg>
                @hongfu553 製作
            </a>
        </div>
    </main>

    <!-- 互動腳本 -->
    <script>
        // 確保與測驗頁面的 localStorage key 相同，保持主題同步
        const THEME_KEY = 'exam_114_theme_tailwind';

        function initTheme() {
            const savedTheme = localStorage.getItem(THEME_KEY);
            const htmlEl = document.documentElement;
            const themeBtnSpan = document.querySelector('#theme-btn span');
            
            // 如果儲存為淺色，則移除 dark class；反之則保留 dark (預設深色)
            if (savedTheme === 'light') {
                htmlEl.classList.remove('dark');
                if(themeBtnSpan) themeBtnSpan.textContent = '深色模式';
            } else {
                htmlEl.classList.add('dark');
                if(themeBtnSpan) themeBtnSpan.textContent = '淺色模式';
            }
        }

        function toggleTheme() {
            const htmlEl = document.documentElement;
            const isDark = htmlEl.classList.toggle('dark');
            localStorage.setItem(THEME_KEY, isDark ? 'dark' : 'light');
            
            const themeBtnSpan = document.querySelector('#theme-btn span');
            if (themeBtnSpan) {
                themeBtnSpan.textContent = isDark ? '淺色模式' : '深色模式';
            }
        }

        // 初始化佈景主題
        initTheme();

        function handleSelect(element, targetUrl) {
            // 加入點擊時的縮放與透明度變化
            element.classList.add('scale-95', 'opacity-80');
            
            // 延遲後執行真實的頁面跳轉
            setTimeout(() => {
                element.classList.remove('scale-95', 'opacity-80');
                window.location.href = targetUrl;
            }, 300);
        }
    </script>
</body>
</html>
